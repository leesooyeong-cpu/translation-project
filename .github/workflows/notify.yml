name: Push 알림

on:
  push:
    branches: [master, main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 이메일 알림 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[GitHub 자동화 보고서] ${{ github.repository }} - ${{ github.ref_name }} 브랜치 업데이트"
          to: leesooyeong@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            안녕하세요, 조쉬님!

            마스터 브랜치에 새로운 작업이 완료되었습니다.

            ━━━━━━━━━━━━━━━━━━━━━━
            📁 저장소  : ${{ github.repository }}
            🌿 브랜치  : ${{ github.ref_name }}
            💬 커밋 내용 : ${{ github.event.head_commit.message }}
            👤 작성자  : ${{ github.event.head_commit.author.name }}
            🕐 시각    : ${{ github.event.head_commit.timestamp }}
            ━━━━━━━━━━━━━━━━━━━━━━

            🔗 저장소 바로가기:
            https://github.com/${{ github.repository }}

            자동화 시스템이 정상 가동 중입니다.
