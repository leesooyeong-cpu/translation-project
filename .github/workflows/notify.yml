name: Push 알림

on:
  push:
    branches: [master, main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 이메일 알림 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[translation-project] Push 알림 - ${{ github.ref_name }} 브랜치"
          to: leesooyeong@gmail.com
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            조쉬님, push가 감지되었습니다!

            - 저장소: ${{ github.repository }}
            - 브랜치: ${{ github.ref_name }}
            - 커밋: ${{ github.event.head_commit.message }}
            - 작성자: ${{ github.event.head_commit.author.name }}
            - 시각: ${{ github.event.head_commit.timestamp }}

            https://github.com/${{ github.repository }}
